name: Refresh homepage data

# Builds data/home/today.json (Hoje na História/Portugal, Nasceram Hoje,
# Destaque, Inspiração) server-side once a day, so the browser only reads one
# local JSON — no API keys in the client, no per-visit third-party calls,
# works offline.
#
# Scheduling note: GitHub delays cron runs by minutes to HOURS, so the gate
# must never test the hour of day (an "== 07h" gate silently skipped every
# run for weeks). Instead we gate on the snapshot itself: run whenever
# today.json is not yet from today (Europe/Lisbon). Several crons spread over
# the day act as catch-up retries; whichever fires first does the work and
# the rest no-op.

on:
  schedule:
    - cron: '20 6 * * *'      # target 07:20 Lisbon (summer)
    - cron: '20 7 * * *'      # target 07:20 Lisbon (winter)
    - cron: '0 10 * * *'      # catch-up (GitHub cron can run hours late)
    - cron: '0 14 * * *'      # catch-up
    - cron: '0 18 * * *'      # last-chance catch-up
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: home-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if today.json is already from today (Europe/Lisbon)
        id: gate
        run: |
          want="$(TZ=Europe/Lisbon date +%F)"
          have="$(jq -r '.date // empty' data/home/today.json 2>/dev/null || true)"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$have" = "$want" ]; then
            echo "Snapshot already fresh ($have) — nothing to do."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.gate.outputs.go == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build homepage snapshot
        if: steps.gate.outputs.go == 'true'
        run: node data/home/build-home.mjs

      - name: Commit snapshot if it changed
        if: steps.gate.outputs.go == 'true'
        run: |
          if [ -n "$(git status --porcelain data/home/today.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/home/today.json
            git commit -m "chore(home): refresh daily discovery snapshot [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes in today.json."
          fi
