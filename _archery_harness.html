<!doctype html><html lang="pt"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><base href="/">
<style>body{margin:0;background:#0a0c1a;color:#0f0}#root{max-width:860px;margin:0 auto;padding:12px}#log{font:12px monospace;white-space:pre-wrap;padding:10px}</style></head><body>
<div id="root"></div><pre id="log"></pre>
<script>
const L = m => document.getElementById('log').textContent += m + '\n';
window.onerror = (m, s, l) => L('JSERROR: ' + m + ' @ ' + s + ':' + l);
window.addEventListener('unhandledrejection', e => L('JSREJECT: ' + (e.reason && e.reason.message || e.reason)));
</script>
<script src="src/games/engine/canvas.js"></script>
<script src="src/games/engine/particles.js"></script>
<script src="src/games/engine/audio.js"></script>
<script src="src/games/engine/storage.js"></script>
<script src="src/games/engine/gamedata.js"></script>
<script src="js/games/game-progress.js"></script>
<script src="js/games/game-archery.js"></script>
<script>
ArcheryGame.init(document.getElementById('root'));
let shots = 0, lastScore = -1;
/* relógio do loop: virtual-time avança timers mas não rAF */
setInterval(() => { try { ArcheryGame._step(0.03); } catch (e) { L('STEP-ERR: ' + e.message); } }, 30);

function pe(type, el, x, y) {
  el.dispatchEvent(new PointerEvent(type, { clientX: x, clientY: y, pointerId: 1, bubbles: true, isPrimary: true }));
}
function shoot() {
  const cv = document.getElementById('arch-cv');
  if (!cv) { L('no canvas'); return; }
  const r = cv.getBoundingClientRect();
  /* alvo a 12m: centro projetado ≈ h*0.484; mira ligeiramente acima p/ compensar a queda */
  const x = r.left + r.width / 2 + (Math.random() * 8 - 4);
  const y = r.top + r.height * 0.478;
  pe('pointerdown', cv, x, y);
  setTimeout(() => L('  after down: ' + JSON.stringify(ArcheryGame._debug())), 120);
  setTimeout(() => pe('pointermove', cv, x, y - 2), 300);
  setTimeout(() => L('  before up: ' + JSON.stringify(ArcheryGame._debug())), 960);
  setTimeout(() => pe('pointerup', cv, x, y - 2), 1000);   /* força ~máxima */
  setTimeout(() => L('  after up: ' + JSON.stringify(ArcheryGame._debug())), 1200);
  shots++;
  setTimeout(check, 2400);                                  /* voo + resolução */
}
function check() {
  const sc = document.getElementById('arch-score');
  const modal = document.querySelector('.arch-modal');
  if (modal) {
    L('END MODAL: ' + modal.querySelector('h3').textContent + ' | ' + (modal.querySelector('.arch-end-score') || {}).textContent);
    L('DONE after ' + shots + ' shots');
    return;
  }
  if (sc) {
    const v = +sc.textContent;
    const ar = (document.getElementById('arch-arrows') || {}).textContent;
    L('shot ' + shots + ': score=' + v + ' arrows="' + ar + '"' + (v > lastScore ? ' (HIT)' : ''));
    lastScore = v;
  }
  if (shots < 8) shoot(); else L('DONE (cap)');
}
setTimeout(() => {
  const lvl = document.querySelector('[data-lvl="0"]');
  if (!lvl) { L('no level button'); return; }
  lvl.click();
  L('level 1 started');
  setTimeout(shoot, 500);
}, 600);
</script>
</body></html>
