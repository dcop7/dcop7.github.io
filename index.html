<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Diogo's website</title>
<meta name="description" content="Centro pessoal de produtividade — ferramentas, jogos, quizzes, mapas e muito mais."/>
<meta name="theme-color" content="#6366f1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Diogo"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="favicon.svg"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="shortcut icon" href="favicon.svg"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/tokens.css"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/layout.css"/>
<link rel="stylesheet" href="css/components.css"/>
<link rel="stylesheet" href="css/views/home.css"/>
<link rel="stylesheet" href="css/views/games.css"/>
<link rel="stylesheet" href="css/views/tools.css"/>
<link rel="stylesheet" href="css/views/features.css"/>
<link rel="stylesheet" href="css/views/quiz.css"/>
<link rel="stylesheet" href="css/views/explorer.css"/>
<link rel="stylesheet" href="css/views/explore-kb.css"/>
<link rel="stylesheet" href="css/views/worlddata.css"/>
<link rel="stylesheet" href="css/views/explorer-body.css"/>
<link rel="stylesheet" href="css/views/ocorrencias.css"/>
<link rel="stylesheet" href="css/views/eventos.css"/>
<link rel="stylesheet" href="css/views/noticias.css"/>
<link rel="stylesheet" href="css/views/f1.css"/>
<script src="js/core/i18n.js"></script>
</head>
<body>

<div id="bg-wallpaper" class="bg-wallpaper" aria-hidden="true"></div>
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
</div>

<!-- ── THEME PANEL ── -->
<div id="theme-panel" class="theme-panel">
  <div class="theme-panel-title" data-i18n="theme.title">Tema</div>
  <div class="theme-grid">
    <button class="theme-option" data-theme="dark" data-i18n="theme.dark">Escuro</button>
    <button class="theme-option" data-theme="light" data-i18n="theme.light">Claro</button>
  </div>
</div>

<div id="sidebar-overlay" class="sidebar-overlay"></div>
<aside id="sidebar" class="sidebar"></aside>

<div class="app-main">

  <header id="site-header">
    <div class="hdr-left">
      <button class="sb-toggle" id="sb-toggle" aria-label="Menu" data-i18n-title="hdr.menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="brand">
        <span class="brand-name">Diogo's</span>
        <span class="brand-site">website</span>
      </div>
    </div>
    <div class="hdr-center">
      <div class="search-wrap">
        <svg class="search-icon-svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" class="search-input" placeholder="Search…" data-i18n-ph="hdr.search" autocomplete="off"/>
        <kbd class="search-kbd">↵</kbd>
      </div>
    </div>
    <div class="hdr-right">
      <div class="clock">
        <strong id="date-el">—</strong>
        <span id="time-el">—</span>
      </div>
      <div class="font-ctrl-wrap" title="Tamanho do texto" data-i18n-title="hdr.textsize">
        <div class="font-ctrl">
          <button class="font-btn" id="font-dec">−</button>
          <span class="font-size-lbl" id="font-lbl">M</span>
          <button class="font-btn" id="font-inc">+</button>
        </div>
      </div>
      <button class="icon-btn" id="theme-toggle-btn" title="Mudar tema" data-i18n-title="hdr.theme">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="lang-btn" id="lang-btn" onclick="I18n.toggle()" title="Mudar idioma" data-i18n-title="hdr.lang.title">PT</button>
    </div>
  </header>

  <div id="search-dropdown" class="search-dropdown" role="listbox"></div>

  <main id="app-content">

    <!-- ── HOME VIEW ── -->
    <div id="view-home" class="view">
      <div class="view-inner">
        <div class="disc-head">
          <h1 class="disc-greeting" id="disc-greeting">Olá</h1>
          <p class="disc-date" id="disc-sub">Descobre algo novo hoje</p>
          <p class="disc-welcome" id="disc-welcome" hidden></p>
        </div>
        <div id="util-panel" class="util-panel"></div>
        <div id="disc-panel" class="disc-panel">
          <div class="disc-loading">A carregar as descobertas do dia…</div>
        </div>
      </div>
    </div>

    <!-- ── CHEATSHEETS VIEW ── -->
    <div id="view-cheatsheets" class="view">
      <div class="view-inner">
        <div id="cheatsheets-page"></div>
      </div>
    </div>

    <!-- ── GAMES VIEW ── -->
    <div id="view-games" class="view">
      <div class="view-inner">
        <div id="games-hub"></div>
        <div id="games-area" hidden>
          <div class="breadcrumb">
            <button class="bc-back" id="game-bc-back">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
              Jogos
            </button>
            <span class="bc-sep">/</span>
            <span class="bc-page" id="game-bc-name"></span>
          </div>
          <div class="game-pane-host">
            <div class="game-pane active" id="pane-hangman">
              <div class="hf-card">
                <div class="hf-top">
                  <span class="hf-title">🎮 Jogo da Forca</span>
                  <div class="hf-age-wrap">
                    <label class="hf-age-lbl" for="hf-age-sel">Idade:</label>
                    <select class="hf-age-sel" id="hf-age-sel" aria-label="Idade do jogador">
                      <option value="6">6</option>
                      <option value="7">7</option>
                      <option value="8" selected>8</option>
                      <option value="9">9</option>
                      <option value="10">10</option>
                      <option value="11">11</option>
                      <option value="12">12</option>
                      <option value="13">13</option>
                      <option value="14">14+</option>
                    </select>
                  </div>
                </div>
                <div class="hf-body">
                  <div class="hf-gallows-col">
                    <svg class="hf-svg" id="hf-svg" viewBox="0 0 130 185" xmlns="http://www.w3.org/2000/svg">
                      <line x1="10" y1="175" x2="120" y2="175"/>
                      <line x1="40" y1="175" x2="40" y2="10"/>
                      <line x1="40" y1="10" x2="95" y2="10"/>
                      <line x1="95" y1="10" x2="95" y2="30"/>
                      <circle id="hf-head" class="hf-part" cx="95" cy="46" r="16"/>
                      <line id="hf-body-line" class="hf-part" x1="95" y1="62" x2="95" y2="112"/>
                      <line id="hf-arm-l" class="hf-part" x1="95" y1="76" x2="68" y2="98"/>
                      <line id="hf-arm-r" class="hf-part" x1="95" y1="76" x2="122" y2="98"/>
                      <line id="hf-leg-l" class="hf-part" x1="95" y1="112" x2="68" y2="148"/>
                      <line id="hf-leg-r" class="hf-part" x1="95" y1="112" x2="122" y2="148"/>
                    </svg>
                    <div class="hf-lives" id="hf-lives"></div>
                  </div>
                  <div class="hf-game-col">
                    <div class="hf-cat-row"><span class="hf-cat-lbl">Categoria:</span><span class="hf-cat-val" id="hf-category">—</span></div>
                    <div class="hf-cat-row"><span class="hf-cat-lbl">Letras:</span><span class="hf-cat-val" id="hf-letter-count">—</span></div>
                    <div class="hf-word-row" id="hf-word-row"></div>
                    <div class="hf-wrong-row"><span class="hf-wrong-lbl">Letras erradas:</span><span class="hf-wrong-val" id="hf-wrong-letters">—</span></div>
                    <div class="hf-keyboard" id="hf-keyboard"></div>
                    <div class="hf-msg" id="hf-msg"></div>
                    <button class="hf-new-btn" id="hf-new-btn">🔄 Nova Palavra</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="game-pane" id="pane-wordle"></div>
            <div class="game-pane" id="pane-minesweeper"></div>
            <div class="game-pane" id="pane-bomb"></div>
            <div class="game-pane" id="pane-memory"></div>
            <div class="game-pane" id="pane-reaction"></div>
            <div class="game-pane" id="pane-chess"></div>
            <div class="game-pane" id="pane-battleship"></div>
            <div class="game-pane" id="pane-uno"></div>
            <div class="game-pane" id="pane-neon-shooter"></div>
            <div class="game-pane" id="pane-gravity-lab"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── LINKS VIEW ── -->
    <div id="view-links" class="view">
      <div class="lp-page">
        <aside class="lp-sidebar" id="lp-cat-list"></aside>
        <div class="lp-content" id="lp-content"></div>
      </div>
    </div>

    <!-- ── TOOLS VIEW ── -->
    <div id="view-tools" class="view"></div>

    <!-- ── VISUAL TOOLS VIEW ── -->
    <div id="view-visual" class="view"></div>

    <!-- ── PHOTOGRAPHY VIEW ── -->
    <div id="view-photography" class="view"></div>

    <!-- ── MEDIA VIEW ── -->

    <!-- ── SETTINGS VIEW ── -->
    <div id="view-settings" class="view"></div>

    <!-- ── QUIZ VIEW ── -->
    <div id="view-quiz" class="view"></div>
    <div id="view-humor" class="view"></div>

    <!-- ── EXPLORER VIEW ── -->
    <div id="view-explorer" class="view"></div>

    <!-- ── OCORRÊNCIAS VIEW ── -->
    <div id="view-ocorrencias" class="view"></div>

    <!-- ── EVENTOS VIEW ── -->
    <div id="view-eventos" class="view"></div>

    <!-- ── NOTÍCIAS VIEW ── -->
    <div id="view-noticias" class="view"></div>

    <!-- ── FÓRMULA 1 VIEW (experimental) ── -->
    <div id="view-f1" class="view"></div>

    <!-- ── SEARCH RESULTS VIEW ── -->
    <div id="view-search" class="view">
      <div class="view-inner" id="search-results-page"></div>
    </div>

  </main>
</div>

<div class="popup" id="popup"></div>

<!-- ── MOBILE BOTTOM NAV ── -->
<nav class="mob-nav" id="mob-nav" aria-label="Navegação móvel">
  <div class="mob-nav-inner">
    <button class="mob-nav-btn active" data-route="home" aria-label="Início">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Início</span>
    </button>
    <button class="mob-nav-btn" data-route="links" aria-label="Links">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span>Links</span>
    </button>
    <button class="mob-nav-btn" data-route="tools" aria-label="Ferramentas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      <span>Ferramentas</span>
    </button>
    <button class="mob-nav-btn" data-route="cheatsheets" aria-label="Cheatsheets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>
      <span>Cheatsheets</span>
    </button>
    <button class="mob-nav-btn" data-route="games" aria-label="Jogos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2.5"/><path d="M7 10v4M5 12h4M17 11l2 1-2 1"/></svg>
      <span>Jogos</span>
    </button>
  </div>
</nav>
